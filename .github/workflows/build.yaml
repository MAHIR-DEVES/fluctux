name: Fluctux CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Build
        run: docker build -t dockermahin/fluctux:latest .

      - name: Push Image
        run: |
          docker login -u dokermahin -p ${{ secrets.DOCKER_ACCESS_TOKEN }}
          docker push dockermahin/fluctux:latest



